name: delego-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build
      - name: Prisma validate
        run: npx prisma validate --schema apps/api/prisma/schema.prisma
      - name: OpenAPI contract check
        run: test -f packages/contracts/openapi/delego.yaml

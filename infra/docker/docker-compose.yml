version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: delego-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: delego
      POSTGRES_USER: delego
      POSTGRES_PASSWORD: delego
    ports:
      - "5434:5432"
    volumes:
      - delego_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: delego-redis
    restart: unless-stopped
    ports:
      - "6380:6379"

volumes:
  delego_postgres_data:

services:
  postgres:
    image: postgres:16
    container_name: delego-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-delego}
      POSTGRES_USER: ${POSTGRES_USER:-delego}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-delego}
    ports:
      - "5434:5432"
    volumes:
      - delego_postgres_data_v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delego -d delego"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    container_name: delego-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: delego-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: ${API_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://delego:delego@postgres:5432/delego?schema=public}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-30d}
      CORS_ORIGINS: ${CORS_ORIGINS}
      MEDIA_ROOT: ${MEDIA_ROOT:-/data/media}
      WORKER_URL: ${WORKER_URL:-http://worker:3010}
    volumes:
      - delego_media:/data/media
    ports:
      - "${API_PUBLIC_PORT:-3000}:${API_PORT:-3000}"

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    container_name: delego-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      WORKER_PORT: ${WORKER_PORT:-3010}
      DATABASE_URL: ${DATABASE_URL:-postgresql://delego:delego@postgres:5432/delego?schema=public}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      OCR_PROVIDER: ${OCR_PROVIDER:-tesseract}
      MEDIA_ROOT: ${MEDIA_ROOT:-/data/media}
    volumes:
      - delego_media:/data/media
    ports:
      - "${WORKER_PUBLIC_PORT:-3010}:${WORKER_PORT:-3010}"

volumes:
  delego_postgres_data_v2:
  delego_media:
